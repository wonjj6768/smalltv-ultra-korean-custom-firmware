<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Display Settings</title>
    <link rel="stylesheet" href="./css/pico.min.css?v=20260602b" />
    <link rel="stylesheet" href="./css/style.css?v=20260602b" />
    <script src="./js/alpinejs.min.js?v=20260602b" defer></script>
    <script src="./js/utils.js?v=20260602b"></script>
    <script src="./js/themeSwitcher.js?v=20260602b"></script>
    <script src="./js/rotationHandler.js?v=20260602b"></script>
    <script src="./js/main.js?v=20260602b"></script>
  </head>
  <body>
    <main class="container">
      <header id="header-placeholder"></header>

      <a href="./index.html" class="wifi-back-link">← Back to Home</a>

      <section x-data="rotationHandler()" x-init="init()">
        <h2>Display Settings</h2>

        <p>Adjust LCD orientation and backlight brightness.</p>

        <label for="screen-rotation">Rotation</label>
        <select
          id="screen-rotation"
          x-model.number="rotation"
          x-bind:disabled="loading"
        >
          <option value="0">Portrait (mode 0)</option>
          <option value="1">Landscape right (mode 1)</option>
          <option value="2">Upside down (mode 2)</option>
          <option value="3">Landscape left (mode 3)</option>
          <option value="4">Portrait mirrored (mode 4)</option>
          <option value="5">Landscape right mirrored (mode 5)</option>
          <option value="6">Upside down mirrored (mode 6)</option>
          <option value="7">Landscape left mirrored (mode 7)</option>
        </select>

        <small
          >Modes 4 to 7 are mirrored variants supported by the display
          driver.</small
        >

        <div
          style="margin-top: 0.5em; display: flex; gap: 0.5em; flex-wrap: wrap"
        >
          <button
            type="button"
            class="primary"
            @click="saveRotation()"
            x-bind:disabled="loading"
          >
            Save Rotation
          </button>
          <button
            type="button"
            @click="fetchRotation()"
            x-bind:disabled="loading"
          >
            Refresh
          </button>
        </div>

        <hr />

        <label for="display-brightness">
          Brightness <strong x-text="brightness + '%'"></strong>
        </label>
        <input
          id="display-brightness"
          type="range"
          min="5"
          max="100"
          step="1"
          x-model.number="brightness"
          x-bind:disabled="loading"
          @change="saveBrightness()"
        />
        <small>Minimum brightness is limited to 5% so the screen stays visible.</small>

        <label style="margin-top: 1em">
          <input
            type="checkbox"
            x-model="nightBrightnessEnabled"
            x-bind:disabled="loading"
          />
          Use scheduled low brightness
        </label>

        <div class="metric-grid">
          <div class="metric-card">
            <span>Start</span>
            <input
              type="time"
              x-model="nightStartTime"
              x-bind:disabled="loading || !nightBrightnessEnabled"
            />
          </div>
          <div class="metric-card">
            <span>End</span>
            <input
              type="time"
              x-model="nightEndTime"
              x-bind:disabled="loading || !nightBrightnessEnabled"
            />
          </div>
        </div>

        <label for="display-night-brightness">
          Scheduled brightness
          <strong x-text="nightBrightness + '%'"></strong>
        </label>
        <input
          id="display-night-brightness"
          type="range"
          min="5"
          max="100"
          step="1"
          x-model.number="nightBrightness"
          x-bind:disabled="loading || !nightBrightnessEnabled"
        />
        <small>Overnight ranges such as 22:00 to 07:00 are supported.</small>

        <div
          style="margin-top: 0.5em; display: flex; gap: 0.5em; flex-wrap: wrap"
        >
          <button
            type="button"
            class="primary"
            @click="saveBrightness()"
            x-bind:disabled="loading"
          >
            Save Brightness
          </button>
          <button
            type="button"
            @click="fetchBrightness()"
            x-bind:disabled="loading"
          >
            Refresh
          </button>
        </div>

        <p x-text="statusMsg"></p>
      </section>

      <footer id="footer-placeholder"></footer>
    </main>
  </body>
</html>
