<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Display Settings</title>
    <link rel="stylesheet" href="./css/pico.min.css?v=20260602d" />
    <link rel="stylesheet" href="./css/style.css?v=20260602d" />
    <script src="./js/alpinejs.min.js?v=20260602d" defer></script>
    <script src="./js/utils.js?v=20260602d"></script>
    <script src="./js/rotationHandler.js?v=20260602d"></script>
    <script src="./js/main.js?v=20260602d"></script>
  </head>
  <body>
    <main class="container app-shell">
      <header id="header-placeholder"></header>

      <a href="./index.html" class="back-link">← Back to Home</a>

      <section x-data="rotationHandler()" x-init="init()" class="settings-page">
        <div class="page-hero">
          <p class="eyebrow">Display</p>
          <h2>LCD Settings</h2>
          <p>Set orientation, normal brightness, and hourly low-brightness mode.</p>
        </div>

        <div class="settings-grid">
          <article class="setting-card">
            <header class="card-heading">
              <div>
                <p class="eyebrow">Orientation</p>
                <h3>Rotation</h3>
              </div>
            </header>

            <label for="screen-rotation">Rotation</label>
            <select
              id="screen-rotation"
              x-model.number="rotation"
              x-bind:disabled="loading"
            >
              <option value="0">Portrait (mode 0)</option>
              <option value="1">Landscape right (mode 1)</option>
              <option value="2">Upside down (mode 2)</option>
              <option value="3">Landscape left (mode 3)</option>
              <option value="4">Portrait mirrored (mode 4)</option>
              <option value="5">Landscape right mirrored (mode 5)</option>
              <option value="6">Upside down mirrored (mode 6)</option>
              <option value="7">Landscape left mirrored (mode 7)</option>
            </select>
            <small>Modes 4 to 7 are mirrored variants supported by the display driver.</small>

            <div class="action-row spaced">
              <button
                type="button"
                class="primary"
                @click="saveRotation()"
                x-bind:disabled="loading"
              >
                Save Rotation
              </button>
              <button type="button" @click="fetchRotation()" x-bind:disabled="loading">
                Refresh
              </button>
            </div>
          </article>

          <article class="setting-card">
            <header class="card-heading">
              <div>
                <p class="eyebrow">Backlight</p>
                <h3>Brightness</h3>
              </div>
              <span class="status-pill" x-text="brightness + '%'"></span>
            </header>

            <label for="display-brightness">Normal brightness</label>
            <input
              id="display-brightness"
              type="range"
              min="5"
              max="100"
              step="1"
              x-model.number="brightness"
              x-bind:disabled="loading"
              @change="saveBrightness()"
            />
            <small>Minimum brightness is limited to 5% so the screen stays visible.</small>

            <label class="switch-row">
              <span>
                <strong>Use scheduled low brightness</strong>
                <small>Checked once per hour. Overnight ranges are supported.</small>
              </span>
              <input
                type="checkbox"
                x-model="nightBrightnessEnabled"
                x-bind:disabled="loading"
              />
            </label>

            <div class="metric-grid">
              <div class="metric-card">
                <span>Start</span>
                <select
                  x-model.number="nightStartHour"
                  x-bind:disabled="loading || !nightBrightnessEnabled"
                >
                  <template x-for="option in hourOptions()" x-bind:key="option.value">
                    <option x-bind:value="option.value" x-text="option.label"></option>
                  </template>
                </select>
              </div>
              <div class="metric-card">
                <span>End</span>
                <select
                  x-model.number="nightEndHour"
                  x-bind:disabled="loading || !nightBrightnessEnabled"
                >
                  <template x-for="option in hourOptions()" x-bind:key="option.value">
                    <option x-bind:value="option.value" x-text="option.label"></option>
                  </template>
                </select>
              </div>
            </div>

            <label for="display-night-brightness">
              Scheduled brightness
              <strong x-text="nightBrightness + '%'"></strong>
            </label>
            <input
              id="display-night-brightness"
              type="range"
              min="5"
              max="100"
              step="1"
              x-model.number="nightBrightness"
              x-bind:disabled="loading || !nightBrightnessEnabled"
            />

            <div class="action-row spaced">
              <button
                type="button"
                class="primary"
                @click="saveBrightness()"
                x-bind:disabled="loading"
              >
                Save Brightness
              </button>
              <button type="button" @click="fetchBrightness()" x-bind:disabled="loading">
                Refresh
              </button>
            </div>

            <p x-text="statusMsg"></p>
          </article>
        </div>
      </section>

      <footer id="footer-placeholder"></footer>
    </main>
  </body>
</html>
