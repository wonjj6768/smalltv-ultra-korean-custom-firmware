<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firmware / FS Update</title>
    <link rel="stylesheet" href="./css/pico.min.css?v=20260602d" />
    <link rel="stylesheet" href="./css/style.css?v=20260602d" />
    <script src="./js/alpinejs.min.js?v=20260602d" defer></script>
    <script src="./js/utils.js?v=20260602d"></script>
    <script src="./js/otaUploadHandler.js?v=20260602d"></script>
    <script src="./js/main.js?v=20260602d"></script>
  </head>
  <body>
    <main class="container app-shell">
      <header id="header-placeholder"></header>
      <a href="./index.html" class="back-link">← Back to Home</a>
      <section x-data="otaUploadHandler()" class="settings-page">
        <div class="page-hero">
          <p class="eyebrow">Update</p>
          <h2>Firmware / LittleFS</h2>
          <p>Upload only the release binaries built for SmallTV-Ultra.</p>
        </div>
        <article class="setting-card">
          <form @submit.prevent="uploadFile">
            <input type="file" x-ref="fileInput" required accept=".bin" />
            <select x-model="uploadType">
              <option value="firmware">Firmware</option>
              <option value="fs">LittleFS (html/js/css/config)</option>
            </select>
            <button type="submit" x-bind:disabled="uploading">Upload</button>
          </form>
          <template x-if="uploading">
            <div class="upload-progress">
              <label>Progress</label>
              <progress max="100" :value="progress"></progress>
              <div class="upload-progress-row">
                <div><strong x-text="progress + '%'"></strong></div>
                <div x-text="etaText"></div>
                <button @click="cancelUpload" type="button">Cancel</button>
              </div>
            </div>
          </template>
          <p x-text="uploadMessage"></p>
        </article>
      </section>

      <footer id="footer-placeholder"></footer>
    </main>
  </body>
</html>
