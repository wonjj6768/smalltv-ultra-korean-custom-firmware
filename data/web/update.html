<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firmware / FS Update</title>
    <link rel="stylesheet" href="./css/pico.min.css?v=20260602e" />
    <link rel="stylesheet" href="./css/style.css?v=20260602e" />
    <script src="./js/alpinejs.min.js?v=20260602e" defer></script>
    <script src="./js/utils.js?v=20260602e"></script>
    <script src="./js/otaUploadHandler.js?v=20260602e"></script>
    <script src="./js/main.js?v=20260602e"></script>
  </head>
  <body>
    <main class="container app-shell">
      <header id="header-placeholder"></header>
      <a href="./index.html" class="back-link">← Back to Home</a>
      <section x-data="otaUploadHandler()" x-init="init()" class="settings-page">
        <div class="page-hero">
          <p class="eyebrow">Update</p>
          <h2>Firmware / LittleFS</h2>
          <p>Check GitHub releases, then apply firmware and LittleFS manually.</p>
        </div>

        <article class="setting-card">
          <header class="card-heading">
            <div>
              <p class="eyebrow">Release Check</p>
              <h3>Update Notification</h3>
            </div>
            <span
              class="status-pill"
              x-text="updateAvailable ? 'Update available' : 'No update'"
            ></span>
          </header>

          <div class="metric-grid">
            <div class="metric-card">
              <span>Current</span>
              <strong x-text="currentVersion || 'unknown'"></strong>
            </div>
            <div class="metric-card">
              <span>Latest</span>
              <strong x-text="latestVersion || 'unknown'"></strong>
            </div>
          </div>

          <p x-text="updateMessage"></p>

          <div class="action-row">
            <button
              type="button"
              @click="checkLatestRelease()"
              x-bind:disabled="checking || uploading"
            >
              Check Update
            </button>
            <button
              type="button"
              class="primary"
              @click="applyReleaseAsset('firmware')"
              x-bind:disabled="uploading || !latestAssets.firmware"
            >
              Apply Firmware
            </button>
            <button
              type="button"
              class="primary"
              @click="applyReleaseAsset('fs')"
              x-bind:disabled="uploading || !latestAssets.fs"
            >
              Apply LittleFS
            </button>
            <a
              x-show="latestUrl"
              x-bind:href="latestUrl"
              target="_blank"
              rel="noreferrer"
            >
              Open Release
            </a>
          </div>
        </article>

        <article class="setting-card">
          <header class="card-heading">
            <div>
              <p class="eyebrow">Manual Upload</p>
              <h3>Local .bin File</h3>
            </div>
          </header>
          <form @submit.prevent="uploadFile">
            <input type="file" x-ref="fileInput" required accept=".bin" />
            <select x-model="uploadType">
              <option value="firmware">Firmware</option>
              <option value="fs">LittleFS (html/js/css/config)</option>
            </select>
            <button type="submit" x-bind:disabled="uploading">Upload</button>
          </form>
          <template x-if="uploading">
            <div class="upload-progress">
              <label>Progress</label>
              <progress max="100" :value="progress"></progress>
              <div class="upload-progress-row">
                <div><strong x-text="progress + '%'"></strong></div>
                <div x-text="etaText"></div>
                <button @click="cancelUpload" type="button">Cancel</button>
              </div>
            </div>
          </template>
          <p x-text="uploadMessage"></p>
        </article>
      </section>

      <footer id="footer-placeholder"></footer>
    </main>
  </body>
</html>
