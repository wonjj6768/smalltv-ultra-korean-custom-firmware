<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NTP Sync</title>
    <link rel="stylesheet" href="./css/pico.min.css?v=20260602d" />
    <link rel="stylesheet" href="./css/style.css?v=20260602d" />
    <script src="./js/alpinejs.min.js?v=20260602d" defer></script>
    <script src="./js/utils.js?v=20260602d"></script>
    <script src="./js/ntpHandler.js?v=20260602d"></script>
    <script src="./js/main.js?v=20260602d"></script>
  </head>
  <body>
    <main class="container app-shell">
      <header id="header-placeholder"></header>

      <a href="./index.html" class="back-link">← Back to Home</a>

      <section x-data="ntpHandler()" x-init="init()" class="settings-page">
        <div class="page-hero">
          <p class="eyebrow">Time</p>
          <h2>NTP Time</h2>
          <p>Keep the clock synced before weather and brightness schedules run.</p>
        </div>

        <div class="settings-grid">
          <article class="setting-card">
            <header class="card-heading">
              <div>
                <p class="eyebrow">Status</p>
                <h3>Current Sync</h3>
              </div>
              <span class="status-pill" x-text="lastStatus"></span>
            </header>

            <div class="metric-grid">
              <div class="metric-card">
                <span>Last sync</span>
                <strong x-text="humanTime(lastSyncTime)"></strong>
              </div>
              <div class="metric-card">
                <span>Result</span>
                <strong
                  x-text="lastOk ? 'Succeeded' : 'Failed or not performed'"
                ></strong>
              </div>
            </div>

            <div class="action-row spaced">
              <button
                type="button"
                class="primary"
                @click="syncNow()"
                x-bind:disabled="loading"
              >
                Sync Now
              </button>
              <button type="button" @click="fetchStatus()">Refresh</button>
            </div>
          </article>

          <article class="setting-card">
            <header class="card-heading">
              <div>
                <p class="eyebrow">Configuration</p>
                <h3>NTP Server</h3>
              </div>
            </header>

            <label for="ntp-server">NTP Server</label>
            <input
              id="ntp-server"
              type="text"
              x-model="ntpServer"
              placeholder="pool.ntp.org"
            />

            <label for="timezone-region">Timezone Region</label>
            <select id="timezone-region" x-model="timezoneRegion">
              <template x-for="option in timezoneOptions" :key="option.value">
                <option :value="option.value" x-text="option.label"></option>
              </template>
            </select>
            <small x-text="timezoneDescription"></small>

            <div class="action-row spaced">
              <button type="button" class="primary" @click="saveConfig()">
                Save
              </button>
            </div>
          </article>
        </div>
      </section>

      <footer id="footer-placeholder"></footer>
    </main>
  </body>
</html>
